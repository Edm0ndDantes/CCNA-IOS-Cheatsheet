site_name: Cisco IOS Commands - CCNA
site_url: https://ccna-commands.example
theme:
  name: material
  font:
    code: Red Hat Mono
  logo: assets/Router-Firewall.svg
  favicon: assets/Router-Firewall.svg
  features:
    - navigation.footer
  palette:
    scheme: slate
    primary: green

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

extra:
  social:
    - icon: simple/github
      link: https://github.com/Edm0ndDantes